<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCA-Trie Algorithm Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f1419;
            color: #e7e9ea;
            overflow: hidden;
        }
        
        .container {
            display: grid;
            grid-template-columns: 1fr 400px;
            grid-template-rows: 60px 1fr;
            height: 100vh;
            gap: 1px;
            background: #2f3336;
        }
        
        header {
            grid-column: 1 / -1;
            background: #16181c;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid #2f3336;
        }
        
        header h1 {
            font-size: 1.2em;
            font-weight: 600;
            color: #f7f9f9;
        }
        
        header .subtitle {
            margin-left: 15px;
            color: #71767b;
            font-size: 0.9em;
        }
        
        .graph-panel {
            background: #16181c;
            position: relative;
            overflow: hidden;
        }
        
        #graph-svg {
            width: 100%;
            height: 100%;
        }
        
        .side-panel {
            background: #16181c;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .panel-section {
            padding: 15px;
            border-bottom: 1px solid #2f3336;
        }
        
        .panel-section h3 {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #71767b;
            margin-bottom: 12px;
        }
        
        .step-info {
            flex: 1;
            overflow-y: auto;
        }
        
        .step-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #f7f9f9;
            margin-bottom: 10px;
        }
        
        .step-description {
            font-size: 0.9em;
            line-height: 1.5;
            color: #b0b3b8;
            white-space: pre-line;
        }
        
        .controls {
            display: flex;
            gap: 8px;
            padding: 15px;
            background: #16181c;
            border-top: 1px solid #2f3336;
        }
        
        .controls button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .controls button.primary {
            background: #1d9bf0;
            color: white;
        }
        
        .controls button.primary:hover {
            background: #1a8cd8;
        }
        
        .controls button.secondary {
            background: #2f3336;
            color: #e7e9ea;
        }
        
        .controls button.secondary:hover {
            background: #3e4144;
        }
        
        .controls button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .step-counter {
            text-align: center;
            padding: 8px;
            font-size: 0.85em;
            color: #71767b;
        }
        
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 10px 15px;
            background: #1a1d21;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8em;
            color: #b0b3b8;
        }
        
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .legend-dot.admitted { background: #00ba7c; }
        .legend-dot.filtered { background: #f4212e; }
        .legend-dot.pending { background: #3e4144; }
        .legend-dot.highlighted { background: #1d9bf0; }
        .legend-dot.question { background: #ffd700; }
        
        .path-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85em;
        }
        
        .path-table th {
            text-align: left;
            padding: 8px 6px;
            color: #71767b;
            font-weight: 500;
            border-bottom: 1px solid #2f3336;
        }
        
        .path-table td {
            padding: 8px 6px;
            border-bottom: 1px solid #1a1d21;
            color: #b0b3b8;
        }
        
        .path-table tr:hover td {
            background: #1a1d21;
        }
        
        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8em;
            font-weight: 500;
        }
        
        .status-badge.admitted {
            background: rgba(0, 186, 124, 0.2);
            color: #00ba7c;
        }
        
        .status-badge.filtered {
            background: rgba(244, 33, 46, 0.2);
            color: #f4212e;
        }
        
        .status-badge.pending {
            background: rgba(62, 65, 68, 0.2);
            color: #71767b;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .stat-item {
            background: #1a1d21;
            padding: 12px;
            border-radius: 8px;
        }
        
        .stat-value {
            font-size: 1.4em;
            font-weight: 700;
            color: #f7f9f9;
        }
        
        .stat-label {
            font-size: 0.75em;
            color: #71767b;
            margin-top: 4px;
        }
        
        .stat-value.admitted { color: #00ba7c; }
        .stat-value.filtered { color: #f4212e; }
        
        /* D3.js styles */
        .node-circle {
            stroke-width: 2px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .node-circle:hover {
            filter: brightness(1.2);
        }
        
        .node-label {
            font-size: 11px;
            fill: #b0b3b8;
            text-anchor: middle;
            pointer-events: none;
        }
        
        .node-type {
            font-size: 9px;
            fill: #71767b;
            text-anchor: middle;
            pointer-events: none;
        }
        
        .link {
            stroke: #2f3336;
            stroke-width: 1.5px;
            fill: none;
            transition: all 0.3s ease;
        }
        
        .link-label {
            font-size: 9px;
            fill: #536471;
        }
        
        .tooltip {
            position: absolute;
            background: #1a1d21;
            border: 1px solid #2f3336;
            border-radius: 8px;
            padding: 12px;
            font-size: 0.85em;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1000;
            max-width: 250px;
        }
        
        .tooltip.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>DCA-Trie Algorithm Visualization</h1>
            <span class="subtitle">TypeOracle Filtering Walkthrough</span>
        </header>
        
        <div class="graph-panel">
            <svg id="graph-svg"></svg>
            <div class="tooltip" id="tooltip"></div>
        </div>
        
        <div class="side-panel">
            <div class="panel-section">
                <h3>Current Step</h3>
                <div class="step-title" id="step-title">Loading...</div>
                <div class="step-description" id="step-description"></div>
            </div>
            
            <div class="panel-section">
                <h3>Statistics</h3>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="stat-total">0</div>
                        <div class="stat-label">Total Paths</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value admitted" id="stat-admitted">0</div>
                        <div class="stat-label">Admitted</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value filtered" id="stat-filtered">0</div>
                        <div class="stat-label">Filtered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="stat-reduction">0%</div>
                        <div class="stat-label">Reduction</div>
                    </div>
                </div>
            </div>
            
            <div class="panel-section" style="flex: 1; overflow-y: auto;">
                <h3>Path Status</h3>
                <table class="path-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Route</th>
                            <th>Type</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="path-table-body"></tbody>
                </table>
            </div>
            
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-dot question"></div>
                    <span>Question Entity</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot admitted"></div>
                    <span>Admitted</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot filtered"></div>
                    <span>Filtered</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot pending"></div>
                    <span>Pending</span>
                </div>
            </div>
            
            <div class="controls">
                <button class="secondary" id="prev-btn" onclick="prevStep()">Previous</button>
                <button class="primary" id="next-btn" onclick="nextStep()">Next</button>
            </div>
            
            <div class="step-counter" id="step-counter">Step 1 / 12</div>
        </div>
    </div>

    <script>
        // Knowledge Graph Data
        const kgData = {
            question: "What language is spoken in Jamaica?",
            nodes: [
                { id: "Jamaica", type: "Country", label: "Jamaica", x: 150, y: 300, question: true },
                { id: "Jamaican_Creole", type: "Language", label: "Jamaican Creole", x: 450, y: 80 },
                { id: "Jamaican_English", type: "Language", label: "Jamaican English", x: 450, y: 160 },
                { id: "English", type: "Language", label: "English", x: 450, y: 240 },
                { id: "Spanish", type: "Language", label: "Spanish", x: 450, y: 320 },
                { id: "Jamaican_dollar", type: "Currency", label: "Jamaican Dollar", x: 450, y: 400 },
                { id: "Kingston", type: "City", label: "Kingston", x: 450, y: 480 },
                { id: "Caribbean", type: "Region", label: "Caribbean", x: 450, y: 560 },
            ],
            links: [
                { source: "Jamaica", target: "Jamaican_Creole", relation: "languages_spoken", id: "e1" },
                { source: "Jamaica", target: "Jamaican_English", relation: "languages_spoken", id: "e2" },
                { source: "Jamaica", target: "English", relation: "official_language", id: "e3" },
                { source: "Jamaica", target: "Spanish", relation: "languages_spoken", id: "e4" },
                { source: "Jamaica", target: "Jamaican_dollar", relation: "currency_used", id: "e5" },
                { source: "Jamaica", target: "Kingston", relation: "capital", id: "e6" },
                { source: "Jamaica", target: "Caribbean", relation: "containedby", id: "e7" },
            ],
            paths: [
                { id: 1, terminal: "Jamaican_Creole", type: "Language", route: "Jamaica -> Jamaican Creole", admitted: true },
                { id: 2, terminal: "Jamaican_English", type: "Language", route: "Jamaica -> Jamaican English", admitted: true },
                { id: 3, terminal: "English", type: "Language", route: "Jamaica -> English", admitted: true },
                { id: 4, terminal: "Spanish", type: "Language", route: "Jamaica -> Spanish", admitted: true },
                { id: 5, terminal: "Jamaican_dollar", type: "Currency", route: "Jamaica -> Jamaican Dollar", admitted: false },
                { id: 6, terminal: "Kingston", type: "City", route: "Jamaica -> Kingston", admitted: false },
                { id: 7, terminal: "Caribbean", type: "Region", route: "Jamaica -> Caribbean", admitted: false },
            ]
        };

        // Algorithm Steps
        const steps = [
            {
                title: "Input: Question and Knowledge Graph",
                description: `Question: "${kgData.question}"

We need to find paths from Jamaica to potential answer entities in the knowledge graph.

The graph contains 8 entities connected by 7 relations.`,
                highlightNodes: ["Jamaica"],
                highlightLinks: [],
                admitted: [],
                filtered: [],
            },
            {
                title: "Path Generation: DFS Enumeration",
                description: `Starting from Jamaica, we enumerate all paths up to 2 hops.

The Depth-First Search discovers 7 candidate paths to different entity types.`,
                highlightNodes: ["Jamaica"],
                highlightLinks: kgData.links.map(l => l.id),
                admitted: [],
                filtered: [],
            },
            {
                title: "Type Inference: Answer Type Detection",
                description: `From the question, we infer the expected answer type:

Answer Type: Language

The TypeOracle will verify each path's terminal entity matches this type.`,
                highlightNodes: ["Jamaica"],
                highlightLinks: [],
                admitted: [],
                filtered: [],
            },
            {
                title: "Oracle: Path 1 - ADMITTED",
                description: `Path: Jamaica -> Jamaican Creole

Terminal: Jamaican Creole (Type: Language)

Range Gate: PASS
  "languages_spoken" allows Language type

Type Gate: PASS
  Terminal type "Language" matches answer type

Result: ADMITTED`,
                highlightNodes: ["Jamaica", "Jamaican_Creole"],
                highlightLinks: ["e1"],
                admitted: [1],
                filtered: [],
            },
            {
                title: "Oracle: Path 2 - ADMITTED",
                description: `Path: Jamaica -> Jamaican English

Terminal: Jamaican English (Type: Language)

Range Gate: PASS
  "languages_spoken" allows Language type

Type Gate: PASS
  Terminal type "Language" matches answer type

Result: ADMITTED`,
                highlightNodes: ["Jamaica", "Jamaican_English"],
                highlightLinks: ["e2"],
                admitted: [1, 2],
                filtered: [],
            },
            {
                title: "Oracle: Path 3 - ADMITTED",
                description: `Path: Jamaica -> English

Terminal: English (Type: Language)

Range Gate: PASS
  "official_language" allows Language type

Type Gate: PASS
  Terminal type "Language" matches answer type

Result: ADMITTED`,
                highlightNodes: ["Jamaica", "English"],
                highlightLinks: ["e3"],
                admitted: [1, 2, 3],
                filtered: [],
            },
            {
                title: "Oracle: Path 4 - ADMITTED",
                description: `Path: Jamaica -> Spanish

Terminal: Spanish (Type: Language)

Range Gate: PASS
  "languages_spoken" allows Language type

Type Gate: PASS
  Terminal type "Language" matches answer type

Result: ADMITTED`,
                highlightNodes: ["Jamaica", "Spanish"],
                highlightLinks: ["e4"],
                admitted: [1, 2, 3, 4],
                filtered: [],
            },
            {
                title: "Oracle: Path 5 - FILTERED",
                description: `Path: Jamaica -> Jamaican Dollar

Terminal: Jamaican Dollar (Type: Currency)

Range Gate: PASS
  "currency_used" allows Currency type

Type Gate: FAIL
  Terminal type "Currency" does NOT match "Language"

Result: FILTERED`,
                highlightNodes: ["Jamaica", "Jamaican_dollar"],
                highlightLinks: ["e5"],
                admitted: [1, 2, 3, 4],
                filtered: [5],
            },
            {
                title: "Oracle: Path 6 - FILTERED",
                description: `Path: Jamaica -> Kingston

Terminal: Kingston (Type: City)

Range Gate: PASS
  "capital" allows City type

Type Gate: FAIL
  Terminal type "City" does NOT match "Language"

Result: FILTERED`,
                highlightNodes: ["Jamaica", "Kingston"],
                highlightLinks: ["e6"],
                admitted: [1, 2, 3, 4],
                filtered: [5, 6],
            },
            {
                title: "Oracle: Path 7 - FILTERED",
                description: `Path: Jamaica -> Caribbean

Terminal: Caribbean (Type: Region)

Range Gate: PASS
  "containedby" allows Region type

Type Gate: FAIL
  Terminal type "Region" does NOT match "Language"

Result: FILTERED`,
                highlightNodes: ["Jamaica", "Caribbean"],
                highlightLinks: ["e7"],
                admitted: [1, 2, 3, 4],
                filtered: [5, 6, 7],
            },
            {
                title: "Filtering Complete",
                description: `TypeOracle has evaluated all 7 paths.

Admitted: 4 paths (Language type)
Filtered: 3 paths (Currency, City, Region)

Reduction: 42.9%

The admitted paths are now in the trie for constrained decoding.`,
                highlightNodes: [],
                highlightLinks: [],
                admitted: [1, 2, 3, 4],
                filtered: [5, 6, 7],
            },
            {
                title: "Result: Constrained Decoding",
                description: `The LLM now generates using only admitted paths.

The trie contains:
  - Jamaica -> Jamaican Creole
  - Jamaica -> Jamaican English
  - Jamaica -> English
  - Jamaica -> Spanish

All generated paths are:
  1. Structurally valid (real KG edges)
  2. Semantically relevant (Language type)

Final Answer: Jamaican Creole English Language`,
                highlightNodes: ["Jamaican_Creole", "Jamaican_English", "English", "Spanish"],
                highlightLinks: ["e1", "e2", "e3", "e4"],
                admitted: [1, 2, 3, 4],
                filtered: [5, 6, 7],
            },
        ];

        let currentStep = 0;
        let svg, simulation;

        // Initialize D3 visualization
        function initGraph() {
            const container = document.querySelector('.graph-panel');
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            svg = d3.select('#graph-svg')
                .attr('width', width)
                .attr('height', height);
            
            // Add zoom behavior
            const g = svg.append('g');
            
            svg.call(d3.zoom()
                .scaleExtent([0.5, 3])
                .on('zoom', (event) => {
                    g.attr('transform', event.transform);
                }));
            
            // Draw links
            const link = g.selectAll('.link')
                .data(kgData.links)
                .enter()
                .append('g')
                .attr('class', 'link-group');
            
            link.append('line')
                .attr('class', 'link')
                .attr('id', d => `link-${d.id}`)
                .attr('x1', d => kgData.nodes.find(n => n.id === d.source).x)
                .attr('y1', d => kgData.nodes.find(n => n.id === d.source).y)
                .attr('x2', d => kgData.nodes.find(n => n.id === d.target).x)
                .attr('y2', d => kgData.nodes.find(n => n.id === d.target).y);
            
            link.append('text')
                .attr('class', 'link-label')
                .attr('x', d => (kgData.nodes.find(n => n.id === d.source).x + kgData.nodes.find(n => n.id === d.target).x) / 2)
                .attr('y', d => (kgData.nodes.find(n => n.id === d.source).y + kgData.nodes.find(n => n.id === d.target).y) / 2 - 8)
                .attr('text-anchor', 'middle')
                .text(d => d.relation);
            
            // Draw nodes
            const node = g.selectAll('.node')
                .data(kgData.nodes)
                .enter()
                .append('g')
                .attr('class', 'node')
                .attr('transform', d => `translate(${d.x},${d.y})`);
            
            node.append('circle')
                .attr('class', 'node-circle')
                .attr('id', d => `node-${d.id}`)
                .attr('r', 25)
                .attr('fill', d => d.question ? '#ffd700' : '#3e4144')
                .attr('stroke', d => d.question ? '#ffd700' : '#536471');
            
            node.append('text')
                .attr('class', 'node-label')
                .attr('y', 40)
                .text(d => d.label);
            
            node.append('text')
                .attr('class', 'node-type')
                .attr('y', 52)
                .text(d => d.type);
            
            // Add tooltip
            const tooltip = d3.select('#tooltip');
            
            node.on('mouseover', (event, d) => {
                tooltip.classed('visible', true)
                    .html(`<strong>${d.label}</strong><br/>Type: ${d.type}`)
                    .style('left', (event.pageX + 10) + 'px')
                    .style('top', (event.pageY - 10) + 'px');
            })
            .on('mouseout', () => {
                tooltip.classed('visible', false);
            });
        }

        // Update visualization for current step
        function updateVisualization() {
            const step = steps[currentStep];
            
            // Update step info
            document.getElementById('step-title').textContent = step.title;
            document.getElementById('step-description').textContent = step.description;
            document.getElementById('step-counter').textContent = `Step ${currentStep + 1} / ${steps.length}`;
            
            // Update buttons
            document.getElementById('prev-btn').disabled = currentStep === 0;
            document.getElementById('next-btn').disabled = currentStep === steps.length - 1;
            
            // Update nodes
            kgData.nodes.forEach(node => {
                const circle = d3.select(`#node-${node.id}`);
                circle
                    .attr('fill', () => {
                        if (step.highlightNodes.includes(node.id)) return '#1d9bf0';
                        if (step.admitted.includes(kgData.paths.find(p => p.terminal === node.id)?.id)) return '#00ba7c';
                        if (step.filtered.includes(kgData.paths.find(p => p.terminal === node.id)?.id)) return '#f4212e';
                        if (node.question) return '#ffd700';
                        return '#3e4144';
                    })
                    .attr('stroke', () => {
                        if (step.highlightNodes.includes(node.id)) return '#1d9bf0';
                        if (step.admitted.includes(kgData.paths.find(p => p.terminal === node.id)?.id)) return '#00ba7c';
                        if (step.filtered.includes(kgData.paths.find(p => p.terminal === node.id)?.id)) return '#f4212e';
                        if (node.question) return '#ffd700';
                        return '#536471';
                    });
            });
            
            // Update links
            kgData.links.forEach(link => {
                const line = d3.select(`#link-${link.id}`);
                line
                    .attr('stroke', () => {
                        if (step.highlightLinks.includes(link.id)) return '#1d9bf0';
                        if (step.admitted.includes(kgData.paths.find(p => p.terminal === link.target)?.id)) return '#00ba7c';
                        if (step.filtered.includes(kgData.paths.find(p => p.terminal === link.target)?.id)) return '#f4212e';
                        return '#2f3336';
                    })
                    .attr('stroke-width', () => {
                        if (step.highlightLinks.includes(link.id)) return 3;
                        return 1.5;
                    });
            });
            
            // Update statistics
            const total = kgData.paths.length;
            const admitted = step.admitted.length;
            const filtered = step.filtered.length;
            const reduction = total > 0 ? ((filtered / total) * 100).toFixed(1) : 0;
            
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-admitted').textContent = admitted;
            document.getElementById('stat-filtered').textContent = filtered;
            document.getElementById('stat-reduction').textContent = `${reduction}%`;
            
            // Update path table
            updatePathTable(step);
        }

        // Update path status table
        function updatePathTable(step) {
            const tbody = document.getElementById('path-table-body');
            tbody.innerHTML = '';
            
            kgData.paths.forEach(path => {
                const row = document.createElement('tr');
                
                let status = 'pending';
                let statusClass = 'status-badge pending';
                
                if (step.admitted.includes(path.id)) {
                    status = 'ADMITTED';
                    statusClass = 'status-badge admitted';
                } else if (step.filtered.includes(path.id)) {
                    status = 'FILTERED';
                    statusClass = 'status-badge filtered';
                }
                
                row.innerHTML = `
                    <td>${path.id}</td>
                    <td>${path.route}</td>
                    <td>${path.type}</td>
                    <td><span class="${statusClass}">${status}</span></td>
                `;
                
                tbody.appendChild(row);
            });
        }

        // Navigation functions
        function nextStep() {
            if (currentStep < steps.length - 1) {
                currentStep++;
                updateVisualization();
            }
        }

        function prevStep() {
            if (currentStep > 0) {
                currentStep--;
                updateVisualization();
            }
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                nextStep();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevStep();
            }
        });

        // Initialize on load
        window.onload = () => {
            initGraph();
            updateVisualization();
        };

        // Handle resize
        window.onresize = () => {
            const container = document.querySelector('.graph-panel');
            svg.attr('width', container.clientWidth)
               .attr('height', container.clientHeight);
        };
    </script>
</body>
</html>
